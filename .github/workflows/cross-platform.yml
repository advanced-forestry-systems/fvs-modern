name: Cross-platform build and load
on: [push, pull_request, workflow_dispatch]
jobs:
  build-load:
    name: Build NE + load (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install gfortran (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gfortran
      - name: Install gfortran (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gcc
          GF=$(ls "$(brew --prefix)"/bin/gfortran-[0-9]* 2>/dev/null | sort -V | tail -1)
          echo "using $GF"
          sudo mkdir -p /usr/local/bin
          sudo ln -sf "$GF" /usr/local/bin/gfortran
          gfortran --version | head -1
      - name: Set up MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc-fortran mingw-w64-x86_64-python make coreutils
      - uses: actions/setup-python@v5
        if: runner.os != 'Windows'
        with:
          python-version: "3.11"
      - name: Build NE and load (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bash deployment/scripts/build_fvs_libraries.sh src-converted lib ne
          ls -la lib/
          python3 - << "PY"
          import ctypes, glob, sys, os
          libs = glob.glob("lib/FVSne.*so") + glob.glob("lib/FVSne.dylib")
          assert libs, "no FVSne shared library produced"
          so = os.path.abspath(libs[0])
          RTLD_LAZY = 0x1
          try: lib = ctypes.CDLL(so, mode=RTLD_LAZY)
          except OSError: lib = ctypes.CDLL(so)
          print("loaded", so)
          for fn in ("fvssetcmdline_", "fvssummary_", "fvsdimsizes_"):
              assert hasattr(lib, fn), f"missing API symbol {fn}"
              print("  [OK]", fn)
          print("PASS: FVSne loads and API entry points are accessible")
          PY
      - name: Build NE and load (Windows/MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          bash deployment/scripts/build_fvs_libraries.sh src-converted lib ne
          ls -la lib/
          python -c "import ctypes,glob,os; L=glob.glob('lib/FVSne.*'); assert L,'no FVSne lib'; lib=ctypes.CDLL(os.path.abspath(L[0])); print('loaded',L[0]); assert hasattr(lib,'fvssetcmdline_'); print('PASS API ok')"
